name: Collect BLS Data Monthly

on:
  schedule:
    # Run at 2 AM UTC on the 3rd day of each month
    - cron: '0 13 3 * *'
  # Allow manual triggering for testing
  workflow_dispatch:

jobs:
  collect-bls-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests
      
      - name: Run BLS data collection script
        run: python scripts/collect_bls_data.py
      
      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/bls_data.csv
          git diff-index --quiet HEAD || git commit -m "Update BLS data - $(date +'%Y-%m-%d')"
          git push
